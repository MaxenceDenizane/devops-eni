version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: todolist_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scriptSQL.sql:/docker-entrypoint-initdb.d/scriptSQL.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyour_password"]
      timeout: 20s
      retries: 10

  # Backend Application Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_container
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: your_password
      DB_NAME: todolist_db
      DB_DIALECT: mysql
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Uptime Kuma Monitoring Service
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma_container
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_data:/app/data
    environment:
      PUID: 1000
      PGID: 1000

volumes:
  mysql_data:
    driver: local
  uptime_data:
    driver: local
